# 工作流名称
name: Deploy to GitHub Pages

# 触发条件：推送到 main 分支时自动执行
on:
  push:
    branches: ["main"]
  # 也可以手动触发部署
  workflow_dispatch:

# 权限配置（必须）
permissions:
  contents: read
  pages: write
  id-token: write

# 并发控制：避免重复部署
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # 部署任务
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取仓库代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 配置 GitHub Pages 环境
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 3. 上传 public 目录作为部署产物
      - name: Upload public folder
        uses: actions/upload-pages-artifact@v3
        with:
          # 明确指定部署仓库根目录的 public 文件夹
          path: "./public"

      # 4. 部署到 GitHub Pages
      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
