                                                    </button>
                                                    <button className="px-6 py-3 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition-colors flex items-center justify-center">
                                                        <i className="fas fa-share w-5 h-5 mr-2"></i>
                                                        分享线路
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            ) : (
                                // 线路列表页面
                                <div className="max-w-6xl mx-auto">
                                    <div className="mb-8">
                                        <h2 className="text-3xl font-bold text-gray-800 mb-2">热门徒步线路</h2>
                                        <p className="text-gray-600">发现最适合你的徒步体验</p>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                        {hikingRoutes.map((route) => (
                                            <div
                                                key={route.id}
                                                className="glass-effect rounded-xl shadow-xl overflow-hidden cursor-pointer hover:shadow-2xl transition-all duration-300 transform hover:-translate-y-1"
                                                onClick={() => handleRouteClick(route)}
                                            >
                                                <div className="h-48 bg-gradient-to-br from-blue-400 to-blue-600 relative overflow-hidden">
                                                    <div className="absolute inset-0 bg-black bg-opacity-30 flex items-center justify-center">
                                                        <h3 className="text-2xl font-bold text-white">{route.name}</h3>
                                                    </div>
                                                    <div className="absolute top-4 right-4">
                                                        <span className="px-3 py-1 bg-white bg-opacity-90 text-blue-700 rounded-full text-sm font-medium">
                                                            {route.level}
                                                        </span>
                                                    </div>
                                                </div>

                                                <div className="p-6">
                                                    <div className="flex items-center justify-between mb-3">
                                                        <div className="flex items-center">
                                                            <i className="fas fa-star text-yellow-500 mr-1"></i>
                                                            <span className="text-sm font-medium">{route.rating}</span>
                                                            <span className="ml-1 text-xs text-gray-500">({route.reviews})</span>
                                                        </div>
                                                    </div>

                                                    <div className="space-y-2 mb-4">
                                                        <div className="flex items-center text-sm text-gray-600">
                                                            <i className="fas fa-calendar w-4 h-4 mr-2"></i>
                                                            <span>{route.duration}</span>
                                                        </div>
                                                        <div className="flex items-center text-sm text-gray-600">
                                                            <i className="fas fa-map-marker-alt w-4 h-4 mr-2"></i>
                                                            <span>{route.distance} • {route.elevation}海拔</span>
                                                        </div>
                                                        <div className="flex items-center text-sm text-gray-600">
                                                            <i className="fas fa-dollar-sign w-4 h-4 mr-2"></i>
                                                            <span>{route.price}</span>
                                                        </div>
                                                    </div>

                                                    <div className="flex flex-wrap gap-2 mb-4">
                                                        {route.features.slice(0, 2).map((feature, index) => (
                                                            <span key={index} className="px-2 py-1 bg-gray-100 text-gray-700 rounded text-xs">
                                                                {feature}
                                                            </span>
                                                        ))}
                                                    </div>

                                                    <button className="w-full px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors text-sm font-medium">
                                                        查看详情
                                                    </button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </main>
                    </div>

                    {/* 右侧聊天栏 */}
                    <div className="w-96 glass-effect border-l border-gray-200 flex flex-col">
                        <div className="p-4 border-b border-gray-200">
                            <h3 className="text-lg font-semibold text-gray-800">徒步助手</h3>
                            <p className="text-sm text-gray-600">实时咨询与推荐</p>
                        </div>

                        <div className="flex-1 overflow-y-auto p-4 space-y-4">
                            {chatMessages.map((message, index) => (
                                <div
                                    key={index}
                                    className={`flex ${message.type === 'user' ? 'justify-end' : 'justify-start'}`}
                                >
                                    <div
                                        className={`max-w-xs px-4 py-2 rounded-lg ${
                                            message.type === 'user'
                                                ? 'bg-blue-600 text-white'
                                                : 'bg-gray-100 text-gray-800'
                                        }`}
                                    >
                                        <p className="text-sm">{message.text}</p>
                                    </div>
                                </div>
                            ))}
                        </div>

                        <div className="p-4 border-t border-gray-200">
                            <div className="flex space-x-2">
                                <input
                                    type="text"
                                    value={userInput}
                                    onChange={(e) => setUserInput(e.target.value)}
                                    onKeyPress={(e) => e.key === 'Enter' && handleSendMessage()}
                                    placeholder="输入你的问题..."
                                    className="flex-1 px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                />
                                <button
                                    onClick={handleSendMessage}
                                    className="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors"
                                >
                                    发送
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
